<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>💖 给你的表白</title>
    <style>
        /* 全局样式 - 浪漫治愈风 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #fce8e6, #fbd9d0);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Georgia', 'Times New Roman', serif;
            padding: 20px;
            margin: 0;
        }
        .card {
            max-width: 600px;
            width: 100%;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 40px 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.12);
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: "❤️";
            position: absolute;
            top: -20px;
            right: -10px;
            font-size: 120px;
            opacity: 0.08;
            transform: rotate(15deg);
        }

        /* ----- 逐行文字样式 ----- */
        .lines {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin: 30px 0 40px;
        }
        .line {
            font-size: 1.6rem;
            line-height: 1.6;
            color: #4a2c2a;
            font-weight: 600;
            letter-spacing: 1px;
            opacity: 0;                      /* 初始透明 */
            transform: translateY(30px);     /* 初始下移 */
            animation: floatUp 1.2s ease forwards;
        }
        /* 每行不同的延迟，形成逐行出现效果 */
        .line:nth-child(1) { animation-delay: 0.2s; }
        .line:nth-child(2) { animation-delay: 1.0s; }
        .line:nth-child(3) { animation-delay: 1.8s; }
        .line:nth-child(4) { animation-delay: 2.6s; }
        .line:nth-child(5) { animation-delay: 3.4s; }
        .line:nth-child(6) { animation-delay: 4.2s; }
        /* 如果需要更多行，请继续增加 nth-child 并相应增加延迟 */

        @keyframes floatUp {
            0% {
                opacity: 0;
                transform: translateY(30px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ----- 音乐控制按钮 ----- */
        .music-btn {
            background: #ff6b6b;
            border: none;
            color: white;
            font-size: 1.2rem;
            padding: 12px 32px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 6px 20px rgba(255, 107, 107, 0.4);
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }
        .music-btn:hover {
            transform: scale(1.04);
            background: #ff5252;
            box-shadow: 0 8px 28px rgba(255, 107, 107, 0.5);
        }
        .music-btn:active {
            transform: scale(0.96);
        }
        .music-btn .status {
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .footer {
            margin-top: 25px;
            font-size: 0.9rem;
            color: #b07a76;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="lines">
            <!-- ✍️ 在这里修改你的表白文字，每一行就是一个 .line -->
            <div class="line">🌹 第一次见到你，</div>
            <div class="line">就觉得世界突然变得明亮。</div>
            <div class="line">你的笑容，你的声音，</div>
            <div class="line">都让我心跳加速。</div>
            <div class="line">我想对你说：</div>
            <div class="line">💕 我喜欢你，做我女朋友好吗？</div>
            <!-- 你可以继续增加更多行，记得在 CSS 中增加对应的 nth-child 延迟 -->
        </div>

        <!-- 音乐控制按钮 -->
        <button class="music-btn" id="musicToggle">
            <span id="icon">▶️</span>
            <span id="text">播放音乐</span>
            <span class="status" id="status">(点击播放)</span>
        </button>

        <div class="footer">—— 送给最特别的你 ——</div>
    </div>

    <!-- 背景音乐：请将 src 改为你自己的音乐文件名 -->
    <audio id="bgMusic" loop preload="auto">
        <source src="love.mp3" type="audio/mpeg">
        <!-- 如果你的音乐是其他格式，可以增加更多 source -->
        您的浏览器不支持 audio 元素。
    </audio>

    <script>
        (function() {
            const audio = document.getElementById('bgMusic');
            const toggleBtn = document.getElementById('musicToggle');
            const iconSpan = document.getElementById('icon');
            const textSpan = document.getElementById('text');
            const statusSpan = document.getElementById('status');

            let isPlaying = false;

            function toggleMusic() {
                if (isPlaying) {
                    audio.pause();
                    isPlaying = false;
                    iconSpan.textContent = '▶️';
                    textSpan.textContent = '播放音乐';
                    statusSpan.textContent = '(已暂停)';
                } else {
                    audio.play().then(() => {
                        isPlaying = true;
                        iconSpan.textContent = '⏸️';
                        textSpan.textContent = '暂停音乐';
                        statusSpan.textContent = '(播放中)';
                    }).catch(err => {
                        alert('请点击页面任意位置后，再次点击播放按钮。');
                        console.warn('音频播放被阻止:', err);
                    });
                }
            }

            toggleBtn.addEventListener('click', toggleMusic);

            // 辅助：点击页面任意空白处尝试预加载（但不自动播放）
            document.addEventListener('click', function() {
                if (audio.paused) {
                    audio.load(); // 预加载但不播放
                }
            }, { once: true });
        })();
    </script>
</body>
</html>
